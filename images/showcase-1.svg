<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#2b0b33"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="50%" y="45%" text-anchor="middle" fill="#86fffd" font-family="Segoe UI, system-ui, sans-serif" font-size="64" filter="url(#glow)">Product Showcase</text>
  <text x="50%" y="58%" text-anchor="middle" fill="#c8f3ff" font-family="Segoe UI, system-ui, sans-serif" font-size="28" opacity="0.85">(Drop in your own high-res images here)</text>
</svg>
