<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#1a223b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="600" cy="400" r="220" fill="#2e0b4d" opacity="0.8" filter="url(#glow)"/>
  <text x="50%" y="45%" text-anchor="middle" fill="#a2ffff" font-family="Segoe UI, system-ui, sans-serif" font-size="60" font-weight="700">Showcase Image 2</text>
  <text x="50%" y="58%" text-anchor="middle" fill="#c8f3ff" font-family="Segoe UI, system-ui, sans-serif" font-size="22" opacity="0.85">(Replace with your mouse photo)</text>
</svg>
